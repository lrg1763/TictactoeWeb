<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крестики-нолики</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Лобби: выбор создать игру или присоединиться -->
    <section id="lobby" class="lobby">
      <h1 class="lobby__title">Крестики-нолики</h1>
      <p class="lobby__subtitle">Играйте с другом по ссылке</p>
      <div class="lobby__actions">
        <button type="button" id="btnCreate" class="btn btn--primary">Создать игру</button>
        <div class="lobby__join">
          <input type="text" id="inputRoomId" class="input" placeholder="Код комнаты" maxlength="12" autocomplete="off">
          <button type="button" id="btnJoin" class="btn btn--secondary">Присоединиться</button>
        </div>
      </div>
      <p id="lobbyError" class="lobby__error" aria-live="polite"></p>
    </section>

    <!-- Игра: сетка, ссылка, статус -->
    <section id="gameSection" class="game-section hidden">
      <div class="game-header">
        <p id="gameStatus" class="game-status">Ожидание второго игрока…</p>
        <div id="shareBlock" class="share-block hidden">
          <label class="share-block__label">Ссылка для друга:</label>
          <div class="share-block__row">
            <input type="text" id="shareUrl" class="input share-block__input" readonly>
            <button type="button" id="btnCopyLink" class="btn btn--small">Копировать</button>
          </div>
        </div>
      </div>
      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Игровое поле 3 на 3">
          <button type="button" class="cell" data-index="0" aria-label="Ячейка 1"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="1" aria-label="Ячейка 2"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="2" aria-label="Ячейка 3"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="3" aria-label="Ячейка 4"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="4" aria-label="Ячейка 5"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="5" aria-label="Ячейка 6"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="6" aria-label="Ячейка 7"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="7" aria-label="Ячейка 8"><span class="cell__content"></span></button>
          <button type="button" class="cell" data-index="8" aria-label="Ячейка 9"><span class="cell__content"></span></button>
        </div>
      </div>
      <div class="game-footer">
        <button type="button" id="btnRestart" class="btn btn--secondary hidden">Новая игра</button>
        <button type="button" id="btnLeave" class="btn btn--ghost">Выйти из комнаты</button>
      </div>
    </section>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
